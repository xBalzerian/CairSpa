    <!-- Fix Header Logo -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          // Find the header logo area
          var headerLogo = document.querySelector('nav a[href="/"]') || 
                           document.querySelector('header a[href="/"]') ||
                           document.querySelector('.text-white.font-serif') ||
                           document.querySelector('nav h1, header h1');
          
          if (headerLogo && !document.getElementById('cairspa-logo-container')) {
            // Create new logo HTML
            var logoContainer = document.createElement('div');
            logoContainer.id = 'cairspa-logo-container';
            logoContainer.innerHTML = `
              <div id="logo-box">
                <img src="./images/logo-phoenix.png" alt="CAIR SPA">
              </div>
              <div id="logo-text">
                <span class="brand-name">CAIR SPA</span>
                <span class="brand-subtitle">MEDICAL SPA</span>
              </div>
            `;
            
            // Replace or insert
            if (headerLogo.parentNode) {
              headerLogo.style.display = 'none'; // Hide original
              headerLogo.parentNode.insertBefore(logoContainer, headerLogo);
            }
          }
        }, 1000);
      });
    </script>
